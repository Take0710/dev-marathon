<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Detail</title>

    <!-- Bootstrap CSSの読み込み -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" />
</head>

<body>
    <div class="container mt-5">
        <h1 class="mb-4">Customer Detail</h1>

        <table class="table table-bordered">
            <tbody>
                <tr>
                    <th>会社名</th>
                    <td id="company-name"></td>
                </tr>
                <tr>
                    <th>業種</th>
                    <td id="業種"></td>
                </tr>
                <tr>
                    <th>連絡先</th>
                    <td id="連絡先"></td>
                </tr>
                <tr>
                    <th>所在地</th>
                    <td id="所在地"></td>
                </tr>
            </tbody>
        </table>

        <a href="../customer-list.html" class="btn btn-secondary">一覧へ戻る</a>
        <button id="delete-button" class="btn btn-danger">削除</button>
        <button id="edit-button" class="btn btn-primary">編集</button>
    </div>

    <script type="module">
        import config from "../config.js";

        const params = new URLSearchParams(window.location.search);
        const customerId = params.get("id");

        console.log("customerId:", customerId);

        fetch(`${config.apiUrl}/customers/${customerId}`)
            .then((response) => {
                console.log("response:", response);
                return response.json();
            })
            .then((customer) => {
                console.log("customer:", customer);

                document.getElementById("company-name").textContent = customer.company_name;
                document.getElementById("industry").textContent = customer.industry;
                document.getElementById("contact").textContent = customer.contact;
                document.getElementById("location").textContent = customer.location;
            })
            .catch((error) => {
                console.error("顧客詳細の取得に失敗しました:", error);
            });

        const deleteButton = document.getElementById("delete-button");

        deleteButton.addEventListener("click", () => {
            fetch(`${config.apiUrl}/customers/${customerId}`, {
                method: "DELETE",
            })

                .then((response) => response.json())
                .then((result) => {
                    console.log(result);
                    location.href = "../customer-list.html";
                })
                .catch((error) => {
                    console.error("顧客削除に失敗しました:", error);
                });
        });

        const editButton = document.getElementById("edit-button");

        editButton.addEventListener("click", () => {
            location.href = `./update.html?id=${customerId}`;
        });
    </script>

    <!-- BootstrapのJavaScriptの読み込み -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>

</html>
