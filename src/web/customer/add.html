<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顧客情報入力</title>
    <!-- Bootstrap CSSの読み込み -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">顧客情報を入力してください</h2>
        <form id="customer-form">
            <div class="form-group">
                <label for="companyName">会社名:</label>
                <input type="text" class="form-control" id="companyName" name="companyName" required>
            </div>
            <div class="form-group">
                <label for="業種">業種:</label>
                <input type="text" class="form-control" id="業種" name="業種" required>
            </div>
            <div class="form-group">
                <label for="連絡先">連絡先:</label>
                <input type="text" class="form-control" id="連絡先" name="連絡先" required>
            </div>
            <div class="form-group">
                <label for="所在地">所在地:</label>
                <input type="text" class="form-control" id="所在地" name="所在地" required>
            </div>
            <button type="submit" class="btn btn-primary">確認画面へ</button>
        </form>
    </div>
   <script>
        document.getElementById('customer-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const customer = {
                companyName: document.getElementById('companyName').value,
                industry: document.getElementById('industry').value,
                contact: document.getElementById('contact').value,
                location: document.getElementById('location').value
            };

            sessionStorage.setItem('customer', JSON.stringify(customer));

            window.location.href = './add-confirm.html';
        });
    </script>

    <!-- BootstrapのJavaScriptの読み込み -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
